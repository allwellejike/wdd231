<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="author" content="Allwell Ejike">
  <meta name="description" content="Form submission result page showing user input confirmation.">

  <title>Form Result</title>

  <link rel="icon" href="images/favicon.ico">
  <link rel="stylesheet" href="styles/main.css">

  <script type="module" src="scripts/main.js" defer></script>
</head>

<body>

<header>
  <h1>Tech Learning Hub</h1>

  <!-- HAMBURGER -->
  <button id="menu" aria-label="Toggle Navigation">☰</button>

  <!-- NAV -->
  <nav>
    <a href="index.html">Home</a>
    <a href="learning.html">Learning</a>
    <a href="services.html">Services</a>
    <a href="form.html">Form</a>
  </nav>
</header>

<main>

  <h2>Submission Result</h2>

  <section id="result">
    <h2 id="thankyou"></h2>
    <p>Email: <span id="email"></span></p>
    <p>Message: <span id="message"></span></p>
  </section>

</main>

<footer>
  <p>&copy; 2026 Tech Learning Hub</p>
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);

  // FORM DATA
  document.getElementById("thankyou").textContent =
    `Thank you ${params.get("name") || ""}`;

  document.getElementById("email").textContent =
    params.get("email") || "";

  document.getElementById("message").textContent =
    params.get("message") || "";

  // ACTIVE NAV
  const links = document.querySelectorAll("nav a");
  const currentPage = window.location.href;

  links.forEach(link => {
    if (currentPage.includes(link.getAttribute("href"))) {
      link.classList.add("active");
    }
  });

  // HAMBURGER
  const menuBtn = document.getElementById("menu");
  const nav = document.querySelector("nav");

  menuBtn.addEventListener("click", () => {
    nav.classList.toggle("open");
  });

});
</script>

</body>
</html>
