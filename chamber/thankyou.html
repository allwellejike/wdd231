<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="author" content="Allwell Ejike">
  <meta name="description" content="Thank you page for Orogbum Chamber membership application">

  <title>Thank You</title>

  <link rel="icon" href="images/favicon.ico">

  <link rel="stylesheet" href="styles/normalize.css">
  <link rel="stylesheet" href="styles/small.css">
  <link rel="stylesheet" href="styles/larger.css">
</head>

<body>

<header>
  <h1>Orogbum Chamber of Commerce</h1>

  <button id="menuBtn">☰</button>

  <nav id="navMenu">
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="join.html">Join</a></li>
    </ul>
  </nav>
</header>

<main>

  <h2>Thank You for Your Application!</h2>

  <section class="card">

    <p>First Name: <span id="first"></span></p>
    <p>Last Name: <span id="last"></span></p>
    <p>Email: <span id="email"></span></p>
    <p>Phone: <span id="phone"></span></p>
    <p>Organization: <span id="organization"></span></p>
    <p>Timestamp: <span id="timestamp"></span></p>

  </section>

</main>

<footer>
  <p>&copy; 2026 Orogbum Chamber of Commerce</p>
</footer>

<script>
  const params = new URLSearchParams(window.location.search);

  document.getElementById("first").textContent = params.get("first") || "";
  document.getElementById("last").textContent = params.get("last") || "";
  document.getElementById("email").textContent = params.get("email") || "";
  document.getElementById("phone").textContent = params.get("phone") || "";
  document.getElementById("organization").textContent = params.get("organization") || "";
  document.getElementById("timestamp").textContent = params.get("timestamp") || "";
</script>

</body>
</html>
